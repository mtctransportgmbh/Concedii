name: MTC Daily Backup

on:
  schedule:
    # Orele sunt în UTC. România = UTC+3 vara (DST), UTC+2 iarna.
    # 07:00 RO (vară) = 04:00 UTC
    - cron: '0 4 * * *'
    # 14:00 RO (vară) = 11:00 UTC
    - cron: '0 11 * * *'
    # 22:00 RO (vară) = 19:00 UTC — backup complet cu email
    - cron: '0 19 * * *'
  workflow_dispatch: {}   # permite rulare manuală din tab-ul Actions

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Determine current UTC hour
        id: hour
        run: echo "h=$(date -u +%H)" >> "$GITHUB_OUTPUT"

      - name: Silent backup (07:00 RO)
        if: steps.hour.outputs.h == '04'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/backup-silent.js 7

      - name: Silent backup (14:00 RO)
        if: steps.hour.outputs.h == '11'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/backup-silent.js 14

      - name: Full backup + email (22:00 RO)
        if: steps.hour.outputs.h == '19'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: node scripts/backup.js
